<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>胖虎的即時翻譯</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', 'Noto Sans TC', 'Noto Sans JP', sans-serif;
    background: #0f0f1a;
    color: #fff;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* Header */
  .header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .header .logo { font-size: 22px; }
  .header .title { font-size: 17px; font-weight: 700; flex: 1; }
  .header .badge {
    font-size: 10px;
    background: #E8344E;
    padding: 3px 10px;
    border-radius: 10px;
    font-weight: 600;
    animation: pulse-badge 1.5s infinite;
    display: none;
  }
  .badge.active { display: inline-block; }
  @keyframes pulse-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  /* Message bubbles */
  .msg-row { display: flex; gap: 8px; animation: fadeIn 0.3s ease; }
  .msg-row.right { justify-content: flex-end; }
  .msg-row.left { justify-content: flex-start; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .bubble {
    max-width: 85%;
    border-radius: 18px;
    padding: 12px 16px;
  }

  /* 右邊 = 我（中文 → 日文） */
  .msg-row.right .bubble {
    background: #06C755;
    border-bottom-right-radius: 4px;
  }
  .msg-row.right .original {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 6px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
  }
  .msg-row.right .translated {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    line-height: 1.4;
  }

  /* 左邊 = 對方（日文 → 中文） */
  .msg-row.left .bubble {
    background: #2a2a3e;
    border-bottom-left-radius: 4px;
  }
  .msg-row.left .original {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .msg-row.left .translated {
    font-size: 24px;
    font-weight: 700;
    color: #E8344E;
    line-height: 1.4;
  }

  /* Processing bubble */
  .processing {
    display: none;
    padding: 0 16px 4px;
  }
  .processing.active { display: block; }
  .processing-inner {
    background: rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 12px 16px;
    font-size: 14px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dot-loader { display: flex; gap: 4px; }
  .dot-loader span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #888;
    animation: dotPulse 1s infinite;
  }
  .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
  .dot-loader span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

  /* Mic bar */
  .mic-bar {
    padding: 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: rgba(15,15,26,0.95);
  }
  .mic-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #06C755, #04a648);
    cursor: pointer;
    font-size: 32px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .mic-btn:active { transform: scale(0.95); }
  .mic-btn.recording {
    background: linear-gradient(135deg, #E8344E, #c42a40);
    box-shadow: 0 0 0 8px rgba(232,52,78,0.2), 0 0 0 16px rgba(232,52,78,0.1);
    animation: mic-pulse 1.5s infinite;
  }
  @keyframes mic-pulse {
    0%,100% { box-shadow: 0 0 0 8px rgba(232,52,78,0.2), 0 0 0 16px rgba(232,52,78,0.1); }
    50% { box-shadow: 0 0 0 12px rgba(232,52,78,0.15), 0 0 0 24px rgba(232,52,78,0.05); }
  }
  .mic-label {
    font-size: 13px;
    color: #888;
    text-align: center;
  }
  .mic-label.active { color: #E8344E; }

  /* Volume meter */
  .volume-bar {
    width: 120px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }
  .volume-bar.active { display: block; }
  .volume-fill {
    height: 100%;
    background: #E8344E;
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s;
  }

  /* Hint */
  .hint {
    text-align: center;
    padding: 40px 20px;
    color: #555;
    font-size: 14px;
    line-height: 2;
  }
  .hint .icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">🎌</span>
  <span class="title">胖虎的即時翻譯</span>
  <span class="badge" id="liveBadge">LIVE</span>
</div>

<div class="chat" id="chat">
  <div class="hint" id="hint">
    <div class="icon">🎤</div>
    按下麥克風開始對話<br>
    說中文或日文都可以，自動偵測<br><br>
    🟢 你說的中文 → 右邊（翻日文）<br>
    🔴 對方說的日文 → 左邊（翻中文）<br><br>
    說完一句話稍微停頓，翻譯就會出現
  </div>
</div>

<div class="processing" id="processing">
  <div class="processing-inner">
    <div class="dot-loader"><span></span><span></span><span></span></div>
    <span id="processingText">辨識翻譯中...</span>
  </div>
</div>

<div class="mic-bar">
  <div class="volume-bar" id="volumeBar">
    <div class="volume-fill" id="volumeFill"></div>
  </div>
  <button class="mic-btn" id="micBtn">🎤</button>
  <div class="mic-label" id="micLabel">按下開始對話</div>
</div>

<script>
const chatEl = document.getElementById('chat');
const micBtn = document.getElementById('micBtn');
const micLabel = document.getElementById('micLabel');
const liveBadge = document.getElementById('liveBadge');
const hint = document.getElementById('hint');
const processing = document.getElementById('processing');
const processingText = document.getElementById('processingText');
const volumeBar = document.getElementById('volumeBar');
const volumeFill = document.getElementById('volumeFill');

let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let audioContext = null;
let analyser = null;
let silenceTimer = null;
let volumeInterval = null;
let stream = null;

// 偵測靜音的參數
const SILENCE_THRESHOLD = 15;   // 音量低於此值 = 靜音
const SILENCE_DURATION = 1500;  // 靜音超過 1.5 秒就送出

// 呼叫語音辨識 + 翻譯 API
async function recognizeAndTranslate(audioBlob) {
  processing.classList.add('active');
  processingText.textContent = '辨識翻譯中...';

  try {
    const formData = new FormData();
    formData.append('audio', audioBlob, 'recording.webm');

    const res = await fetch('/api/voice-translate', {
      method: 'POST',
      body: formData
    });

    const data = await res.json();
    if (data.error) {
      console.error('API error:', data.error);
      return;
    }

    if (data.original && data.translated) {
      addBubble(data.original, data.translated, data.source_lang);
    }
  } catch (e) {
    console.error('Request error:', e);
  } finally {
    processing.classList.remove('active');
  }
}

// 新增對話泡泡
function addBubble(original, translated, sourceLang) {
  hint.style.display = 'none';

  const isChinese = sourceLang && sourceLang.startsWith('zh');
  const row = document.createElement('div');
  row.className = `msg-row ${isChinese ? 'right' : 'left'}`;

  row.innerHTML = `
    <div class="bubble">
      <div class="original">${escapeHtml(original)}</div>
      <div class="translated">${escapeHtml(translated)}</div>
    </div>
  `;

  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// 開始錄音
async function startRecording() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    micLabel.textContent = '請允許麥克風權限';
    return;
  }

  isRecording = true;
  micBtn.classList.add('recording');
  micBtn.textContent = '⏹';
  micLabel.textContent = '正在聆聽... 說完會自動翻譯';
  micLabel.classList.add('active');
  liveBadge.classList.add('active');
  volumeBar.classList.add('active');

  // 音量分析（用來偵測靜音）
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 512;
  source.connect(analyser);

  startNewRecording();
  startVolumeMonitor();
}

function startNewRecording() {
  audioChunks = [];

  mediaRecorder = new MediaRecorder(stream, { mimeType: getSupportedMimeType() });

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) {
      audioChunks.push(e.data);
    }
  };

  mediaRecorder.onstop = () => {
    if (audioChunks.length > 0) {
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
      // 只有超過 0.5 秒的音檔才送出（避免雜音）
      if (blob.size > 5000) {
        recognizeAndTranslate(blob);
      }
    }
    // 如果還在錄音狀態，開始錄下一段
    if (isRecording && stream && stream.active) {
      startNewRecording();
    }
  };

  mediaRecorder.start();
  resetSilenceTimer();
}

function getSupportedMimeType() {
  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg', 'audio/mp4'];
  for (const type of types) {
    if (MediaRecorder.isTypeSupported(type)) return type;
  }
  return 'audio/webm';
}

// 音量監測 + 靜音偵測
function startVolumeMonitor() {
  const dataArray = new Uint8Array(analyser.frequencyBinCount);

  volumeInterval = setInterval(() => {
    if (!analyser) return;
    analyser.getByteFrequencyData(dataArray);

    // 計算平均音量
    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
    const avg = sum / dataArray.length;

    // 更新音量條
    const pct = Math.min(avg / 60 * 100, 100);
    volumeFill.style.width = pct + '%';

    // 靜音偵測
    if (avg > SILENCE_THRESHOLD) {
      resetSilenceTimer();
    }
  }, 100);
}

function resetSilenceTimer() {
  clearTimeout(silenceTimer);
  silenceTimer = setTimeout(() => {
    // 靜音超時 → 送出當前這段
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop(); // 觸發 onstop → 送出 → 開始新錄音
    }
  }, SILENCE_DURATION);
}

// 停止錄音
function stopRecording() {
  isRecording = false;
  clearTimeout(silenceTimer);
  clearInterval(volumeInterval);

  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  if (audioContext) {
    audioContext.close();
    audioContext = null;
  }

  micBtn.classList.remove('recording');
  micBtn.textContent = '🎤';
  micLabel.textContent = '按下開始對話';
  micLabel.classList.remove('active');
  liveBadge.classList.remove('active');
  volumeBar.classList.remove('active');
  volumeFill.style.width = '0%';
}

micBtn.addEventListener('click', () => {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
});
</script>

</body>
</html>
